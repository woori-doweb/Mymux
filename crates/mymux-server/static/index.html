<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <title>Mymux Console</title>
  <link rel="stylesheet" href="vendor/xterm.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="console-body">
  <header id="topbar">
    <button id="btn-menu" title="메뉴" aria-label="menu">☰</button>
    <span class="brand">Mymux Console</span>
    <span id="whoami"></span>
    <span class="spacer"></span>
    <button id="btn-new" title="새 탭">+ Tab</button>
    <button id="btn-split-h" title="좌우 분할 (Ctrl+Shift+D)">⬌</button>
    <button id="btn-split-v" title="상하 분할 (Ctrl+Shift+E)">⬍</button>
    <button id="btn-close" title="포커스된 페인 닫기 (Ctrl+Shift+W)">Close</button>
    <button id="btn-paste" title="포커스된 페인에 붙여넣기 (Ctrl+V · 중클릭)">Paste</button>
    <button id="btn-logout">Logout</button>
  </header>
  <main id="layout">
    <aside id="sidebar">
      <h2>Terminals</h2>
      <ul id="term-list"></ul>

      <div id="cmd-box">
        <div class="side-head">
          <h2>Saved Commands</h2>
          <button id="btn-cmd-add" class="mini" title="명령 추가">+</button>
        </div>
        <input type="text" id="cmd-search" placeholder="명령어 검색…" autocomplete="off" spellcheck="false" />
        <ul id="cmd-list"></ul>
        <p id="cmd-empty" class="muted hidden">저장된 명령이 없습니다. <strong>+</strong> 로 추가하세요.</p>
      </div>

      <div id="audit-box" class="hidden">
        <h2>Recent audit</h2>
        <ul id="audit-list"></ul>
      </div>
    </aside>
    <section id="term-area">
      <div id="tab-bar"></div>
      <div id="tab-content">
        <div id="tab-welcome">
          <p><strong>+ Tab</strong> 으로 새 터미널을 여세요.</p>
          <p class="muted">분할: 상단 <strong>⬌ / ⬍</strong> (또는 Ctrl+Shift+D / E) · 페인 닫기 Ctrl+Shift+W</p>
        </div>
      </div>
      <div id="keybar" aria-hidden="true">
        <button data-k="esc">Esc</button>
        <button data-k="tab">Tab</button>
        <button data-k="ctrl" id="kb-ctrl">Ctrl</button>
        <button data-k="c-c">^C</button>
        <button data-k="up">↑</button>
        <button data-k="down">↓</button>
        <button data-k="left">←</button>
        <button data-k="right">→</button>
        <button data-k="lit:|">|</button>
        <button data-k="lit:/">/</button>
        <button data-k="lit:~">~</button>
        <button data-k="lit:-">-</button>
      </div>
      <div id="ac-popup" class="hidden"><ul id="ac-list"></ul></div>
    </section>
  </main>

  <div id="drawer-backdrop"></div>

  <div id="cmd-modal" class="overlay hidden">
    <form id="cmd-form" class="modal-card">
      <h2 id="cmd-modal-title">명령 추가</h2>
      <label>이름<input type="text" id="cmd-name" required maxlength="100" placeholder="예: Git Status" autocomplete="off" spellcheck="false" /></label>
      <label>명령<input type="text" id="cmd-command" required maxlength="4000" placeholder="예: git status" autocomplete="off" spellcheck="false" /></label>
      <label>설명<input type="text" id="cmd-desc" maxlength="500" placeholder="설명 (선택)" autocomplete="off" spellcheck="false" /></label>
      <p id="cmd-modal-error" class="error"></p>
      <div class="modal-actions">
        <button type="button" id="cmd-cancel" class="ghost">취소</button>
        <button type="submit">저장</button>
      </div>
    </form>
  </div>

  <script src="vendor/xterm.min.js"></script>
  <script src="vendor/addon-fit.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
