# Nginx reverse proxy for the Mymux Web Control Console.
# Terminates TLS and restricts access to the Tailscale range. The upstream app
# listens only on 127.0.0.1:7070. Install to /etc/nginx/sites-available/ and
# symlink into sites-enabled, or drop into conf.d/.

server {
    listen 443 ssl http2;
    server_name mymux-console.tailnet.local;

    ssl_certificate     /etc/ssl/mymux-console/fullchain.pem;
    ssl_certificate_key /etc/ssl/mymux-console/privkey.pem;

    # Only the Tailscale CGNAT range. Tighten to specific 100.x hosts if desired.
    allow 100.64.0.0/10;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:7070;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket terminals need the upgrade headers and long timeouts.
    location /ws/ {
        proxy_pass http://127.0.0.1:7070;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
