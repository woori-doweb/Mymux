# Nginx reverse proxy for the Mymux Web Control Console.
# Dedicated vhost for console.orchestration.kr. Terminates TLS and restricts
# access to the Tailscale range. The upstream app listens only on 127.0.0.1:7070
# and owns the ENTIRE root (/) of this hostname — the front-end uses root-absolute
# /api, /ws and redirects, so it must not be mounted under a sub-path.
#
# DNS:  console.orchestration.kr  A  <this host's Tailscale 100.x IP>
#       (public name, tailnet-only IP — unreachable from the public internet)
# Cert: issue via DNS-01 (the IP is private, so HTTP-01 cannot be used).
#       orchestration.kr is on Cloudflare, so use the cloudflare plugin:
#       sudo certbot certonly --dns-cloudflare \
#         --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
#         -d console.orchestration.kr
#
# Install to /etc/nginx/conf.d/mymux-console.conf (or sites-available + symlink),
# then: sudo nginx -t && sudo systemctl reload nginx

# Optional: redirect plain HTTP to HTTPS for this name (still tailnet-only).
server {
    listen 80;
    server_name console.orchestration.kr;

    allow 100.64.0.0/10;
    deny all;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name console.orchestration.kr;

    ssl_certificate     /etc/letsencrypt/live/console.orchestration.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/console.orchestration.kr/privkey.pem;

    # Only the Tailscale CGNAT range. Tighten to specific 100.x hosts if desired.
    allow 100.64.0.0/10;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:7070;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket terminals need the upgrade headers and long timeouts.
    location /ws/ {
        proxy_pass http://127.0.0.1:7070;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
